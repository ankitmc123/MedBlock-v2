version: '3.7'

networks:
  fabric-swarm-net:
    external: true

services:

  couchdb1:
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 8984:5984
    networks:
      - fabric-swarm-net
    deploy:
      placement:
        constraints:
          - node.labels.role == worker2

  peer1:
    image: hyperledger/fabric-peer:2.5
    container_name: peer1.org1.example.com
    hostname: peer1.org1.example.com

    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric-swarm-net
      - FABRIC_LOGGING_SPEC=INFO

      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt

      - CORE_PEER_ID=peer1.org1.example.com
      - CORE_PEER_ADDRESS=peer1.org1.example.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051

      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.org1.example.com:8051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.example.com:7051

      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp

      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw

    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /srv/fabric-network-swarm/crypto-config/peerOrganizations/org1.example.com/peers/peer1.org1.example.com/msp:/etc/hyperledger/fabric/msp
      - /srv/fabric-network-swarm/crypto-config/peerOrganizations/org1.example.com/peers/peer1.org1.example.com/tls:/etc/hyperledger/fabric/tls
      - /srv/fabric-network-swarm/crypto-config/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp:/etc/hyperledger/fabric/admin_msp
      - /srv/fabric-network-swarm/mychannel.block:/etc/hyperledger/fabric/mychannel.block
      - /srv/fabric-network-swarm/ehr.tar.gz:/etc/hyperledger/fabric/ehr.tar.gz
      - /srv/fabric-network-swarm/app/backend/connection.json:/etc/hyperledger/fabric/connection.json

    ports:
      - 8051:8051

    networks:
      - fabric-swarm-net

    depends_on:
      - couchdb1

    deploy:
      placement:
        constraints:
          - node.labels.role == worker2
