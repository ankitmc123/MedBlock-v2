version: '3.7'

networks:
  fabric-swarm-net:
    external: true

services:
  orderer:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.example.com
    hostname: orderer.example.com

    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]

    volumes:
      - /home/ankit/fabric-network/fabric-network-swarm/channel-artifacts/genesis.block:/var/hyperledger/orderer/genesis.block
      - /home/ankit/fabric-network/fabric-network-swarm/crypto-config/ordererOrganizations/example.com/orderers/orderer.example.com/msp:/var/hyperledger/orderer/msp
      - /home/ankit/fabric-network/fabric-network-swarm/crypto-config/ordererOrganizations/example.com/orderers/orderer.example.com/tls:/var/hyperledger/orderer/tls

    ports:
      - 7050:7050

    networks:
      - fabric-swarm-net

    deploy:
      placement:
        constraints:
          - node.role == manager
